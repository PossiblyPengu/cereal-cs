name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [main, master]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64

    name: Build (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Cereal.App/Cereal.App.csproj -r ${{ matrix.rid }}

      - name: Build
        run: dotnet build Cereal.App/Cereal.App.csproj -c Release --no-restore

      - name: Publish (self-contained)
        run: |
          dotnet publish Cereal.App/Cereal.App.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained \
            --no-restore \
            -o publish/${{ matrix.rid }}
        shell: bash
